{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card shadow-sm border-0 rounded-4">
      <div class="card-body p-4">
        <h2 class="text-success mb-3">Soil Analysis</h2>
        <form method="post">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">pH Level</label>
              <input class="form-control" name="ph" placeholder="Example: 6.8">
            </div>
            <div class="col-md-6">
              <label class="form-label">Organic Matter</label>
              <input class="form-control" name="organic" placeholder="Example: 2.1%">
            </div>
            <div class="col-md-6">
              <label class="form-label">Moisture</label>
              <input class="form-control" name="moisture" placeholder="Example: 18%">
            </div>
            <div class="col-md-6">
              <label class="form-label">Crop Type</label>
              <input class="form-control" name="crop" placeholder="Example: Wheat">
            </div>
          </div>
          <button class="btn btn-success mt-3">Analyze Soil</button>
        </form>
        {% if result %}
          <div class="alert alert-success mt-4">{{ result }}</div>
        {% endif %}
      </div>
    </div>
  </div>
</div>
{% endblock %}
